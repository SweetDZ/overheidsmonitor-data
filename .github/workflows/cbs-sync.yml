name: CBS Data Sync

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      jaar:
        description: 'Jaar (bijv. 2023)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bepaal jaar
        id: jaar
        run: |
          INPUT="${{ github.event.inputs.jaar }}"
          if [ -z "$INPUT" ]; then
            M=$(date +%m); Y=$(date +%Y)
            if [ "$M" -ge 9 ]; then JAAR=$((Y-1)); else JAAR=$((Y-2)); fi
          else
            JAAR=$INPUT
          fi
          echo "jaar=$JAAR" >> $GITHUB_OUTPUT
          echo "Importeer jaar: $JAAR"

      - name: Initialiseer data map
        run: mkdir -p data && touch data/.gitkeep

      # ── 81955NED werkt bewezen op GitHub Actions (150KB) ────────────────
      # Dataset bevat ZOWEL nieuwbouw/mutaties ALS vergunningen per gemeente
      # Perioden formaat voor jaarcijfer: 2023JJ00

      - name: Haal CBS woningmutaties op (81955NED — nieuwbouw + sloop)
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          PERIODE="${JAAR}JJ00"
          OUTPUT="data/cbs_nieuwbouw_${JAAR}.json"

          echo "Ophalen woningmutaties $JAAR via 81955NED..."

          # Haal nieuwbouw/sloop kolommen op — 81955NED bevat beide
          HTTP=$(curl -s -w "%{http_code}" \
            -H "Accept: application/json" \
            --user-agent "OverheidsmonitorNL/1.0" \
            --output "$OUTPUT" \
            "https://opendata.cbs.nl/ODataApi/OData/81955NED/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$top=500")

          SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
          echo "HTTP $HTTP — $SIZE bytes"

          if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 500 ]; then
            echo "✅ Woningmutaties $JAAR: $SIZE bytes"
            # Toon beschikbare kolomnamen uit eerste record
            python3 -c "
          import json, sys
          with open('$OUTPUT') as f: d = json.load(f)
          rows = d.get('value', d) if isinstance(d, dict) else d
          if rows:
              print('Beschikbare kolommen:', list(rows[0].keys()))
              print('Eerste record:', rows[0])
          " 2>/dev/null || head -c 500 "$OUTPUT"
          else
            echo "⚠️ Geen data voor $JAAR — probeer vorig jaar"
            VORIG=$((JAAR-1))
            HTTP2=$(curl -s -w "%{http_code}" \
              -H "Accept: application/json" \
              --user-agent "OverheidsmonitorNL/1.0" \
              --output "$OUTPUT" \
              "https://opendata.cbs.nl/ODataApi/OData/81955NED/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${VORIG}JJ00'&\$top=500")
            SIZE2=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            echo "Vorig jaar ($VORIG): HTTP $HTTP2 — $SIZE2 bytes"
            [ "$HTTP2" = "200" ] && [ "$SIZE2" -gt 500 ] && echo "✅ Gebruikt $VORIG als fallback" || echo '{"value":[]}' > "$OUTPUT"
          fi

      - name: Haal CBS vergunningen op (81955NED)
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          PERIODE="${JAAR}JJ00"
          OUTPUT="data/cbs_vergunningen_${JAAR}.json"

          echo "Ophalen vergunningen $JAAR..."
          HTTP=$(curl -s -w "%{http_code}" \
            -H "Accept: application/json" \
            --user-agent "OverheidsmonitorNL/1.0" \
            --output "$OUTPUT" \
            "https://opendata.cbs.nl/ODataApi/OData/81955NED/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$select=RegioS,Perioden,VerleendeVergunningen_1,GeweigerdAanvragen_2&\$top=500")

          SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
          echo "HTTP $HTTP — $SIZE bytes"
          [ "$HTTP" = "200" ] && [ "$SIZE" -gt 500 ] && echo "✅ Vergunningen $JAAR: $SIZE bytes" || echo '{"value":[]}' > "$OUTPUT"

      - name: Haal CBS gemeenten op (82235NED of 81955NED RegioS)
        run: |
          OUTPUT="data/cbs_gemeenten.json"
          SUCCESS=false

          for DATASET in "82235NED" "81955NED"; do
            echo "Probeer gemeenten via $DATASET..."
            HTTP=$(curl -s -w "%{http_code}" \
              -H "Accept: application/json" \
              --user-agent "OverheidsmonitorNL/1.0" \
              --output "$OUTPUT" \
              "https://opendata.cbs.nl/ODataApi/OData/${DATASET}/RegioS?\$filter=startswith(Key,'GM')&\$select=Key,Title&\$top=500")
            SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            echo "  → HTTP $HTTP, $SIZE bytes"
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 500 ]; then
              echo "✅ Gemeenten via $DATASET: $SIZE bytes"
              SUCCESS=true
              break
            fi
          done

          $SUCCESS || echo '{"value":[]}' > "$OUTPUT"

      - name: Inspecteer kolomnamen nieuwbouw (voor job.php mapping)
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          python3 -c "
          import json
          with open('data/cbs_nieuwbouw_${JAAR}.json') as f:
              d = json.load(f)
          rows = d.get('value', [])
          if rows:
              cols = list(rows[0].keys())
              print(f'Aantal rijen: {len(rows)}')
              print(f'Kolommen ({len(cols)}):')
              for c in cols: print(f'  {c}')
              print()
              # Zoek nieuwbouw-gerelateerde kolommen
              nb_cols = [c for c in cols if any(x in c.lower() for x in ['nieuw','toeg','sloop','ontt','vergun','woning'])]
              print('Woningbouw kolommen:', nb_cols)
          else:
              print('Geen data!')
          " 2>/dev/null || echo "Python analyse mislukt"

      - name: Maak manifest
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          NB=$(stat -c%s "data/cbs_nieuwbouw_${JAAR}.json" 2>/dev/null || echo 0)
          VG=$(stat -c%s "data/cbs_vergunningen_${JAAR}.json" 2>/dev/null || echo 0)
          GM=$(stat -c%s "data/cbs_gemeenten.json" 2>/dev/null || echo 0)
          cat > data/manifest.json << EOF
          {
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "jaar": $JAAR,
            "dataset": "81955NED",
            "nieuwbouw_bytes": $NB,
            "vergunningen_bytes": $VG,
            "gemeenten_bytes": $GM,
            "bron": "CBS StatLine 81955NED",
            "licentie": "CC-BY 4.0"
          }
          EOF
          cat data/manifest.json

      - name: Commit en push
        run: |
          git config user.name  "CBS Data Bot"
          git config user.email "sweetdz@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen"
          else
            JAAR="${{ steps.jaar.outputs.jaar }}"
            git commit -m "CBS sync jaar $JAAR via 81955NED — $(date +%Y-%m-%d)"
            git push
            echo "✅ Gepushed naar SweetDZ/overheidsmonitor-data"
          fi

      - name: Trigger hollandeq.nl
        if: success()
        continue-on-error: true
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          curl -s --max-time 60 \
            "https://hollandeq.nl/cron/job.php?key=${{ secrets.CRON_KEY }}&source=github&jaar=$JAAR" \
            -w "\nHTTP: %{http_code}" || echo "Trigger mislukt (niet kritiek)"
