name: CBS Data Sync

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      jaar:
        description: 'Jaar (bijv. 2023)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bepaal jaar
        id: jaar
        run: |
          INPUT="${{ github.event.inputs.jaar }}"
          if [ -z "$INPUT" ]; then
            M=$(date +%m); Y=$(date +%Y)
            if [ "$M" -ge 9 ]; then JAAR=$((Y-1)); else JAAR=$((Y-2)); fi
          else
            JAAR=$INPUT
          fi
          echo "jaar=$JAAR" >> $GITHUB_OUTPUT
          echo "Importeer jaar: $JAAR"

      - name: Initialiseer data map
        run: |
          mkdir -p data
          # Zorg dat de map getrackt wordt door git
          touch data/.gitkeep

      - name: Haal CBS gemeenten op
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          SUCCESS=false
          
          URLS=(
            "https://opendata.cbs.nl/ODataApi/OData/37221ned/RegioS?\$filter=startswith(Key,'GM')&\$select=Key,Title&\$top=500"
            "https://opendata.cbs.nl/ODataFeed/OData/37221ned/RegioS?\$filter=startswith(Key,'GM')&\$select=Key,Title&\$top=500&\$format=json"
            "https://datasets.cbs.nl/odata/v1/CBS/37221ned/DimensionCodes/RegioS?\$filter=startswith(Identifier,'GM')&\$select=Identifier,Title&\$top=500"
          )
          
          for URL in "${URLS[@]}"; do
            echo "Probeer: $URL"
            HTTP=$(curl -s -w "%{http_code}" \
              -H "Accept: application/json" \
              --user-agent "OverheidsmonitorNL/1.0" \
              --output data/cbs_gemeenten.json \
              "$URL" 2>/dev/null)
            SIZE=$(stat -c%s data/cbs_gemeenten.json 2>/dev/null || echo 0)
            echo "  → HTTP $HTTP, $SIZE bytes"
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 500 ]; then
              echo "✅ Gemeenten opgehaald: $SIZE bytes"
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "⚠️ Gemeenten niet opgehaald via CBS"
            echo '{"value":[]}' > data/cbs_gemeenten.json
          fi

      - name: Haal CBS nieuwbouw op
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          PERIODE="${JAAR}JJ00"
          SUCCESS=false
          OUTPUT="data/cbs_nieuwbouw_${JAAR}.json"
          
          URLS=(
            "https://opendata.cbs.nl/ODataApi/OData/37221ned/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$select=RegioS,Perioden,NieuwbouwToegevoegdAanDeVoorraad_8,OnttrokkenAanDeVoorraad_9,SaldoNieuwbouwOnttrekking_10,Koopwoningen_6,SocialeHuurwoningen_5,ParticuliereHuurwoningen_4&\$top=500"
            "https://opendata.cbs.nl/ODataFeed/OData/37221ned/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$top=500&\$format=json"
            "https://datasets.cbs.nl/odata/v1/CBS/37221ned/Observations?\$filter=Perioden%20eq%20'${PERIODE}'%20and%20startswith(RegioS,'GM')&\$top=5000"
          )
          
          for URL in "${URLS[@]}"; do
            echo "Probeer: $URL"
            HTTP=$(curl -s -w "%{http_code}" \
              -H "Accept: application/json" \
              --user-agent "OverheidsmonitorNL/1.0" \
              --output "$OUTPUT" \
              "$URL" 2>/dev/null)
            SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            echo "  → HTTP $HTTP, $SIZE bytes"
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 200 ]; then
              echo "✅ Nieuwbouw $JAAR opgehaald: $SIZE bytes"
              head -c 300 "$OUTPUT"
              echo ""
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "⚠️ Nieuwbouw $JAAR niet beschikbaar bij CBS"
            echo '{"value":[]}' > "$OUTPUT"
          fi

      - name: Haal CBS vergunningen op
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          PERIODE="${JAAR}JJ00"
          SUCCESS=false
          OUTPUT="data/cbs_vergunningen_${JAAR}.json"
          
          URLS=(
            "https://opendata.cbs.nl/ODataApi/OData/81955NED/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$select=RegioS,VerleendeVergunningen_1,GeweigerdAanvragen_2&\$top=500"
            "https://opendata.cbs.nl/ODataFeed/OData/81955NED/UntypedDataSet?\$filter=startswith(RegioS,'GM')%20and%20Perioden%20eq%20'${PERIODE}'&\$top=500&\$format=json"
          )
          
          for URL in "${URLS[@]}"; do
            echo "Probeer: $URL"
            HTTP=$(curl -s -w "%{http_code}" \
              -H "Accept: application/json" \
              --user-agent "OverheidsmonitorNL/1.0" \
              --output "$OUTPUT" \
              "$URL" 2>/dev/null)
            SIZE=$(stat -c%s "$OUTPUT" 2>/dev/null || echo 0)
            echo "  → HTTP $HTTP, $SIZE bytes"
            if [ "$HTTP" = "200" ] && [ "$SIZE" -gt 200 ]; then
              echo "✅ Vergunningen $JAAR opgehaald: $SIZE bytes"
              SUCCESS=true
              break
            fi
          done
          
          if [ "$SUCCESS" = "false" ]; then
            echo "⚠️ Vergunningen $JAAR niet beschikbaar"
            echo '{"value":[]}' > "$OUTPUT"
          fi

      - name: Maak manifest
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          NB=$(stat -c%s "data/cbs_nieuwbouw_${JAAR}.json" 2>/dev/null || echo 0)
          VG=$(stat -c%s "data/cbs_vergunningen_${JAAR}.json" 2>/dev/null || echo 0)
          GM=$(stat -c%s "data/cbs_gemeenten.json" 2>/dev/null || echo 0)
          cat > data/manifest.json << EOF
          {
            "last_updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "jaar": $JAAR,
            "nieuwbouw_bytes": $NB,
            "vergunningen_bytes": $VG,
            "gemeenten_bytes": $GM,
            "bron": "CBS StatLine OData",
            "licentie": "CC-BY 4.0"
          }
          EOF
          cat data/manifest.json

      - name: Commit en push
        run: |
          git config user.name  "CBS Data Bot"
          git config user.email "sweetdz@users.noreply.github.com"
          git add data/
          git status
          if git diff --staged --quiet; then
            echo "Geen wijzigingen — data al actueel"
          else
            JAAR="${{ steps.jaar.outputs.jaar }}"
            git commit -m "CBS sync jaar $JAAR — $(date +%Y-%m-%d)"
            git push
            echo "✅ Data gepushed naar SweetDZ/overheidsmonitor-data"
          fi

      - name: Trigger hollandeq.nl
        if: success()
        continue-on-error: true
        run: |
          JAAR="${{ steps.jaar.outputs.jaar }}"
          curl -s --max-time 60 \
            "https://hollandeq.nl/cron/job.php?key=${{ secrets.CRON_KEY }}&source=github&jaar=$JAAR" \
            -w "\nHTTP: %{http_code}" \
          && echo "" || echo "Trigger mislukt (niet kritiek)"
